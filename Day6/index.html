<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <a href="">dashboard</a>
        <div class="item">
            <i class="fa-regular fa-circle-user"></i>
            <i class="fa-regular fa-envelope"></i>
            <i class="fa-solid fa-bell"></i>
        </div>
    </header>
    <main>
        <aside>
            <div class="btn-parent">
                <div class="btn"><i class="fa-solid fa-chart-simple"></i>layout</div>
                <div class="btn"><i class="fa-solid fa-table"></i>Report Table</div>
                <div class="btn"><i class="fa-solid fa-chart-line"></i>Chart</div>
                <div class="btn"><i class="fa-solid fa-file"></i>Form</div>
                <div class="btn"><i class="fa-solid fa-box"></i>Logs</div>
            </div> 
            <div class="btn-parent2">
                <div class="btn"><i class="fa-solid fa-chart-simple"></i>layout</div>
                <div class="btn"><i class="fa-solid fa-table"></i>Report Table</div>
                <div class="btn"><i class="fa-solid fa-chart-line"></i>Chart</div>
                <div class="btn"><i class="fa-solid fa-file"></i>Form</div>
                <div class="btn"><i class="fa-solid fa-box"></i>Logs</div>
            </div>    
        </aside>
        <div class="form">
            <a href="">Registration form</a>
            <form action="">
                <div class="form-group">
                    <label for="">Name</label>
                    <input type="text">
                </div>    
                <div class="form-group">
                    <label for="">Email</label>
                    <input type="text">
                </div>    
                <div class="form-group">
                    <label for="">Date of Birth</label>
                    <input type="date">
                </div>    
                <div class="form-group">
                    <label for="">Phone Number</label>
                    <input type="number">
                </div>    
                <div class="form-group">
                    <label for="">Gender</label>
                    <div class="radio_items">
                        <label for="">male</label>
                        <input type="radio" name="gender" id="male">
                        <label for="">female</label>
                        <input type="radio" name="gender" id="female">
                    </div>
				</div>  
                <div class="form-group">
                    <label for="">Favourite item Language</label>
                    <div class="checkbox_items">
                        <label for="">HTML</label>
                        <input type="checkbox" name="favourite" id="html">
                        <label for="">CSS</label>
                        <input type="checkbox" name="favourite" id="css">
                        <label for="">Javascript</label>
                        <input type="checkbox" name="favourite" id="javascript">
                        <label for="">React</label>
                        <input type="checkbox" name="favourite" id="react">
                    </div>
                </div>  
                <div class="form-group">
                    <label for="">Choose a color</label>
                    <select name="" id="">
                        <option>Red</option>
                        <option>Blue</option>
                        <option>Gray</option>
                        <option>Dark</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="">Message</label>
                    <textarea name="" id="" placeholder="Enter your message"></textarea>
                </div>
                <input type="submit" value="Submit" class="submit">
                <input type="submit" class="submit" value="Reset">
            </form>
        </div>
    </main>
    <footer>
        <p>copyright &copy 2026</p>
        <div class="foot">
            <a href="">Privacy policy</a>
            <a href="">Terms and condition</a>
        </div>
    </footer>
</body>
</html>
